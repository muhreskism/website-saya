<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kitchen Production Tuuk</title>

<style>

body{
font-family:Segoe UI;
background:#eceff1;
margin:0;
}

header{
background:#b0bec5;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.nav{
display:flex;
background:#cfd8dc;
}

.nav button{
flex:1;
padding:12px;
border:none;
background:#cfd8dc;
cursor:pointer;
}

.nav button:hover{
background:#b0bec5;
}

.nav button.active{
background:#78909c;
color:white;
}

.container{
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select{
padding:7px;
margin:4px;
border:1px solid #bbb;
border-radius:5px;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
background:#607d8b;
color:white;
cursor:pointer;
}

.edit{background:#fb8c00;}
.delete{background:#e53935;}
.print{background:#43a047;}
.templateBtn{background:#3949ab;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#eceff1;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

.section{display:none;}
.section.active{display:block;}

.recipeBox{
font-size:12px;
background:#f5f5f5;
padding:6px;
border-radius:5px;
}

.summaryTotal{
font-weight:bold;
background:#fafafa;
}

</style>
</head>

<body>

<header>Kitchen Production Planner PRO</header>

<div class="nav">

<button onclick="openTab('raw')" class="active">Master Bahan</button>
<button onclick="openTab('wip')">WIP</button>
<button onclick="openTab('menu')">Menu</button>
<button onclick="openTab('target')">Target</button>
<button onclick="openTab('summary')">Summary</button>

</div>

<div class="container">

<div id="raw" class="section active card">

<h2>Master Bahan</h2>

<input id="rawName" placeholder="Nama bahan">
<input id="rawUom" placeholder="UOM">

<button onclick="saveRaw()">Save</button>

<table id="rawTable"></table>

</div>

<div id="wip" class="section card">

<h2>Master WIP</h2>

<input id="wipName" placeholder="Nama WIP">
<input id="wipOutputUom" placeholder="UOM hasil jadi">

<br>

<input list="itemList" id="wipParent" placeholder="Bahan/WIP">
<datalist id="itemList"></datalist>

<input id="wipQty" type="number" placeholder="Qty">

<button onclick="addWipRecipe()">Tambah</button>
<button onclick="saveWip()">Save WIP</button>

<h3>Recipe</h3>
<table id="wipRecipe"></table>

<h3>Daftar WIP</h3>
<table id="wipTable"></table>

</div>

<div id="menu" class="section card">

<h2>Master Menu</h2>

<input id="menuName" placeholder="Nama Menu">

<select id="menuType">
<option value="food">Food</option>
<option value="drink">Drink</option>
</select>

<br>

<input list="itemList" id="menuParent">
<input id="menuQty" type="number">

<button onclick="addMenuRecipe()">Tambah</button>
<button onclick="saveMenu()">Save Menu</button>

<h3>Recipe</h3>
<table id="menuRecipe"></table>

<h3>Daftar Menu</h3>
<table id="menuTable"></table>

</div>

<div id="target" class="section card">

<h2>Target Penjualan</h2>

<div id="targets"></div>

</div>

<div id="summary" class="section card">

<h2>Summary Kebutuhan</h2>

<button class="print" onclick="window.print()">Print / Save PDF</button>

<table id="summaryTable"></table>

</div>

</div>

<script>

let raw={}
let wip={}
let menu={}
let target={}

let tempWip=[]
let tempMenu=[]

function saveData(){

localStorage.setItem("kitchen_raw",JSON.stringify(raw))
localStorage.setItem("kitchen_wip",JSON.stringify(wip))
localStorage.setItem("kitchen_menu",JSON.stringify(menu))
localStorage.setItem("kitchen_target",JSON.stringify(target))

}

function loadData(){

raw=JSON.parse(localStorage.getItem("kitchen_raw")) || {}
wip=JSON.parse(localStorage.getItem("kitchen_wip")) || {}
menu=JSON.parse(localStorage.getItem("kitchen_menu")) || {}
target=JSON.parse(localStorage.getItem("kitchen_target")) || {}

}

function openTab(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")

}

function refreshList(){

itemList.innerHTML=""

Object.keys(raw).forEach(i=>{
itemList.innerHTML+=`<option value="${i}">`
})

Object.keys(wip).forEach(i=>{
itemList.innerHTML+=`<option value="${i}">`
})

}

function getUom(item){

if(raw[item]) return raw[item].uom
if(wip[item]) return wip[item].uom || "unit"
return ""

}

function saveRaw(){

raw[rawName.value]={uom:rawUom.value}

saveData()
render()

}

function deleteRaw(name){

delete raw[name]

saveData()
render()

}

function addWipRecipe(){

tempWip.push({
parent:wipParent.value,
qty:Number(wipQty.value)
})

render()

}

function saveWip(){

wip[wipName.value]={
uom:wipOutputUom.value,
recipe:[...tempWip]
}

tempWip=[]

saveData()
render()

}

function deleteWip(name){

delete wip[name]

saveData()
render()

}

function addMenuRecipe(){

tempMenu.push({
parent:menuParent.value,
qty:Number(menuQty.value)
})

render()

}

function saveMenu(){

menu[menuName.value]={
type:menuType.value,
recipe:[...tempMenu]
}

tempMenu=[]

saveData()
render()

}

function deleteMenu(name){

delete menu[name]

saveData()
render()

}

function explode(item,qty,total){

if(raw[item]){

if(!total[item]) total[item]=0
total[item]+=qty
return

}

if(wip[item]){

wip[item].recipe.forEach(r=>{
explode(r.parent,qty*r.qty,total)
})

}

}

function calculate(){

let total={}

Object.keys(target).forEach(m=>{

if(!menu[m]) return

let qty=target[m]

menu[m].recipe.forEach(r=>{
explode(r.parent,qty*r.qty,total)
})

})

summaryTable.innerHTML="<tr><th>BAHAN</th><th>TOTAL</th><th>UOM</th></tr>"

Object.keys(total).forEach(i=>{

summaryTable.innerHTML+=`

<tr>

<td>${i}</td>
<td>${total[i].toFixed(2)}</td>
<td>${raw[i].uom}</td>

</tr>

`

})

}

function render(){

refreshList()

rawTable.innerHTML="<tr><th>Bahan</th><th>UOM</th><th>Action</th></tr>"

Object.keys(raw).forEach(r=>{

rawTable.innerHTML+=`

<tr>

<td>${r}</td>
<td>${raw[r].uom}</td>

<td>

<button class="delete" onclick="deleteRaw('${r}')">Delete</button>

</td>

</tr>

`

})

wipRecipe.innerHTML=""

tempWip.forEach((r,i)=>{

wipRecipe.innerHTML+=`

<tr>

<td>${r.parent}</td>
<td>${r.qty}</td>
<td>${getUom(r.parent)}</td>

</tr>

`

})

wipTable.innerHTML=""

Object.keys(wip).forEach(w=>{

let detail=""

wip[w].recipe.forEach(r=>{
detail+=`${r.parent} (${r.qty} ${getUom(r.parent)})<br>`
})

wipTable.innerHTML+=`

<tr>

<td>${w}</td>
<td>${wip[w].uom}</td>
<td class="recipeBox">${detail}</td>

<td>

<button class="delete" onclick="deleteWip('${w}')">Delete</button>

</td>

</tr>

`

})

menuRecipe.innerHTML=""

tempMenu.forEach((r,i)=>{

menuRecipe.innerHTML+=`

<tr>

<td>${r.parent}</td>
<td>${r.qty}</td>
<td>${getUom(r.parent)}</td>

</tr>

`

})

menuTable.innerHTML=""

Object.keys(menu).forEach(m=>{

let detail=""

menu[m].recipe.forEach(r=>{
detail+=`${r.parent} (${r.qty} ${getUom(r.parent)})<br>`
})

menuTable.innerHTML+=`

<tr>

<td>${m}</td>
<td>${menu[m].type}</td>
<td class="recipeBox">${detail}</td>

<td>

<button class="delete" onclick="deleteMenu('${m}')">Delete</button>

</td>

</tr>

`

})

targets.innerHTML=""

Object.keys(menu).forEach(m=>{

targets.innerHTML+=`

${m}

<input type="number"

value="${target[m] || ""}"

onchange="target['${m}']=Number(this.value);saveData();calculate()"

> porsi

<br>

`

})

calculate()

}

loadData()
render()

</script>

</body>
</html>
